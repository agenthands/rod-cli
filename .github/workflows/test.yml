name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.x'

      # Build the binary so the e2e harness (tests/*.go) can drive ../rod-cli.
      - name: Build rod-cli
        run: go build -o rod-cli .

      # Install Chromium up front so the first detection test isn't slowed or
      # made flaky by a mid-test download.
      - name: Install Chromium
        run: ./rod-cli install

      # Headless is the blocking gate. The detection harness is fully offline
      # (internal/detect fixture on 127.0.0.1) — no external-network step here.
      #
      # DELIBERATE EXCLUSION (LIVEWAF-01): the opt-in Tier-2 live smoke check in
      # tests/detection_live_test.go is guarded by `//go:build detection_live`,
      # so this plain `go test ./...` (NO -tags) never compiles or runs it. That
      # is intentional and load-bearing: the live suite hits real third-party WAFs
      # (Cloudflare/DataDome/CreepJS) and is flaky by nature, so it must NOT gate
      # CI. Do NOT add `-tags detection_live` here. Run it manually instead:
      #   go test -tags detection_live ./tests/ -run TestLiveDetection -v
      # See docs/stealth-validation.md for the Tier-1 vs Tier-2 rationale.
      - name: Run tests (headless)
        run: go test ./... -count=1

      - name: Run govulncheck
        run: go run golang.org/x/vuln/cmd/govulncheck@latest ./...
