gomod:
  proxy: true

before:
  hooks:
    - go mod tidy

builds:
-
  ldflags:
    - -s -w -X github.com/agenthands/rod-cli/banner.Version={{ .Version }}
    - -X github.com/agenthands/rod-cli/banner.BuildTime={{ .Date }}
  env:
    - CGO_ENABLED=0
  goos:
    - windows
    - linux
    - darwin
  goarch:
    - amd64
    - 386
    - arm
    - arm64

  ignore:
    - goos: darwin
      goarch: '386'
    - goos: windows
      goarch: 'arm'
    - goos: windows
      goarch: 'arm64'

  binary: '{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}'
  main: "."

archives:
- format: tar.gz
  name_template: '{{ .ProjectName }}_{{ .Version }}_{{ if eq .Os "darwin" }}macOS{{ else }}{{ title .Os }}{{ end }}_{{ if eq .Arch "amd64" }}x86_64{{ else if eq .Arch "386" }}i386{{ else }}{{ .Arch }}{{ end }}'
  format_overrides:
    - goos: windows
      format: zip

checksum:
  algorithm: sha256
  name_template: "{{ .ProjectName }}_{{ .Version }}_checksums.txt"